- name: Install nix packages
  ansible.builtin.package:
    name: "{{ nix_packages }}"
    state: present

- name: Enable nix services
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
    state: "started"
  loop: "{{ nix_services }}"

- name: Clone nix scripts repo
  ansible.builtin.git:
    repo: "{{ nix_git_repo }}"
    dest: "{{ nix_repo_dest_path }}"
    version: main
  become: true
  become_user: "{{ base_user.username }}"

- name: Install nixGL
  ansible.builtin.shell: |
    nix profile add github:nix-community/nixGL --impure
  become: true
  become_user: "{{ base_user.username }}"
  loop: "{{ dotfiles_stow_packages }}"

- name: Run home-manager switch
  ansible.builtin.shell: |
    cd "{{ nix_repo_dest_path }}/{{ nix_git_relative_path }}"
    git pull
    nix run nixpkgs#home-manager -- switch --flake .#rogervn-desktop
  become: true
  become_user: "{{ base_user.username }}"
  loop: "{{ dotfiles_stow_packages }}"

# Idempotent on its own (ln -sf + systemd-tmpfiles --create); runs every
# time so a Mesa bump from nixpkgs updates never leaves it stale.
- name: Set up GPU drivers for nix packages
  ansible.builtin.command: "{{ base_user.homedir }}/.nix-profile/bin/non-nixos-gpu-setup"
  become: true
  changed_when: false

- name: Create nixGL hyprland script
  ansible.builtin.template:
    src: nix-hyprland.sh.j2
    dest: "{{ nix_hyrpland_wrapper_path }}"
    owner: root
    group: root
    mode: '0755'

- name: Create nixGL hyprland session
  ansible.builtin.template:
    src: nix-hyprland.desktop.j2
    dest: /usr/share/wayland-sessions/nix-hyprland.desktop
    owner: root
    group: root
    mode: '0755'

- name: Create nixGL niri script
  ansible.builtin.template:
    src: nix-niri.sh.j2
    dest: "{{ nix_niri_wrapper_path }}"
    owner: root
    group: root
    mode: '0755'

- name: Create nixGL niri session
  ansible.builtin.template:
    src: nix-niri.desktop.j2
    dest: /usr/share/wayland-sessions/nix-niri.desktop
    owner: root
    group: root
    mode: '0755'
